version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: research_db
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: research_logs
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: .
    container_name: research_backend
    depends_on:
      - db
    # Run the FastAPI app
    command: uvicorn backend.backend:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://user:password@db:5432/research_logs
      - PYTHONPATH=/app:/app/backend
    env_file:
      - .env
    volumes:
      - .:/app # Syncs your local code so changes reflect immediately

  frontend:
    build: .
    container_name: research_frontend
    depends_on:
      - backend
    # Explicitly run Streamlit from the frontend folder
    command: streamlit run frontend/ui_main.py --server.port=8501 --server.address=0.0.0.0
    ports:
      - "8501:8501"
    environment:
      - API_BASE_URL=http://backend:8000
      - PYTHONPATH=/app
    env_file:
      - .env
    volumes:
      - .:/app # Critical: Ensures the 'pages/' folder is visible inside the container
      - ./vector_index.faiss:/app/vector_index.faiss
      - ./vector_data.pkl:/app/vector_data.pkl

volumes:
  postgres_data: