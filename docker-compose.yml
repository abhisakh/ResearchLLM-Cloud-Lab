#version: '3.8'
services:
  research-agent:
    build: .
    ports:
      - "8501:8501"
    environment:
      - API_BASE_URL=http://localhost:8000 # Or public IP for mobile testing
    env_file:
      - .env
    volumes:
      - ./backend/chat_history.db:/app/backend/chat_history.db
      - ./vector_index.faiss:/app/vector_index.faiss
      - ./vector_data.pkl:/app/vector_data.pkl